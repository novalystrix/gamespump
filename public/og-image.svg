<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221"/>
      <stop offset="100%" style="stop-color:#1a0540"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="150" cy="150" r="300" fill="#7c3aed" opacity="0.15" filter="url(#glow)"/>
  <circle cx="1050" cy="480" r="250" fill="#ec4899" opacity="0.12" filter="url(#glow)"/>
  <!-- Gamepad icon (simplified) -->
  <g transform="translate(520, 200)">
    <rect x="0" y="10" width="160" height="90" rx="20" fill="none" stroke="url(#textGrad)" stroke-width="5" opacity="0.8"/>
    <circle cx="35" cy="55" r="12" fill="#a855f7" opacity="0.9"/>
    <circle cx="125" cy="55" r="12" fill="#ec4899" opacity="0.9"/>
    <rect x="70" y="43" width="20" height="6" rx="3" fill="white" opacity="0.6"/>
    <rect x="76" y="37" width="6" height="20" rx="3" fill="white" opacity="0.6"/>
  </g>
  <!-- Title -->
  <text x="600" y="360" font-family="Arial Black, sans-serif" font-size="88" font-weight="900" text-anchor="middle" fill="url(#textGrad)">GamesPump</text>
  <!-- Subtitle -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="36" text-anchor="middle" fill="rgba(255,255,255,0.55)">Party Games for Everyone</text>
  <!-- Tagline -->
  <text x="600" y="490" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.3)">No signup. No downloads. Just play.</text>
</svg>
